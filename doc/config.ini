# ==============================================================================
# Project configuration for video-based Valence/Arousal regression
# All parameters are consumed via ConfigManager and read-only at runtime.
# ==============================================================================


[paths]

# Root directory containing pre-extracted feature files (.npy)
data_dir = ./data

# Project documentation directory (feature groups, logs, reports)
doc_dir = ./doc

# CSV with global normalization statistics (mean/std/min/max per feature)
stats_path = ./data/normalization_stats.csv

# JSON defining feature groups, regexes, and metadata
feature_groups_path = ./doc/feature_groups.json


# ==============================================================================
# Feature selection / ranking configuration
# ==============================================================================

[selection]

# Output directory for generated feature-set JSON files
output_dir = ./sets


# ------------------------------------------------------------------
# Dataset handling
# ------------------------------------------------------------------

# Fixed temporal length (in frames) for each sample
time_series_length = 768

# Strategy to fill NaNs before aggregation (e.g. mean, none)
nan_fill_method = none

# Whether to apply label normalization / transform
transform = False


# ------------------------------------------------------------------
# Feature ranking and pruning
# ------------------------------------------------------------------

# Number of top features retained after mutual information ranking
mi_top_k = 300

# Variance threshold for early feature pruning
var_threshold = 1e-10

# Number of CV folds used during selection
cv_folds = 10

# Number of random seeds for ranking stability
seeds = 3

# Spearman correlation threshold for redundancy pruning
redundancy_corr = 0.9

# Metric used for permutation importance ("pearson" or "neg_rmse")
scorer_metric = pearson

# Number of permutation repeats per feature
perm_repeats = 5

# Exclude PCA-derived aggregates during selection
exclude_pca = true


# ------------------------------------------------------------------
# Feature-set sizes
# ------------------------------------------------------------------

# Target-specific feature-set sizes (small / medium)
size_v_small = 16
size_v_med   = 32
size_a_small = 16
size_a_med   = 32

# Sizes for shared / diverse composite sets
size_shared_small = 16
size_diverse_med  = 32


# ------------------------------------------------------------------
# LightGBM parameters (used during selection only)
# ------------------------------------------------------------------

learning_rate = 0.05
num_leaves = 31
n_estimators = 300
feature_fraction = 0.8
bagging_fraction = 0.8
bagging_freq = 1
reg_lambda = 0.0
reg_alpha = 0.0


# ==============================================================================
# Training schedule generation
# ==============================================================================

[scheduling]

# Directory containing feature-set JSON files
sets_dir = ./sets

# Output path for generated training schedule (JSON)
output_path = ./schedules/schedule.json


# ------------------------------------------------------------------
# Random state handling
# ------------------------------------------------------------------

# If true, sample random_state uniformly from [random_state_min, random_state_max]
use_random_state_sampling = false

# Fixed random_state if sampling is disabled
random_state = 42

# Inclusive range for random_state sampling
random_state_min = 1
random_state_max = 1000


# ------------------------------------------------------------------
# Global scheduling behaviour
# ------------------------------------------------------------------

# Maximum number of scheduled models (hard cap)
max_models = 9999


# ------------------------------------------------------------------
# Feature-set size strategy
# ------------------------------------------------------------------

# Strategy to choose between 16- and 32-feature sets
# Options: prefer16, prefer32, mixed
size_strategy = prefer16


# ------------------------------------------------------------------
# Pascal triangle scheduling (low-depth region)
# ------------------------------------------------------------------

# Number of combined feature families (left side of Pascal triangle)
low_depths = 1,2,3

# Number of parameter combinations per depth (must match low_depths)
low_depth_combinations = 8,4,4


# ------------------------------------------------------------------
# Pascal triangle scheduling (high-depth region via exclusions)
# ------------------------------------------------------------------

# Number of excluded families from full set (right side of triangle)
high_excludes = 0,1,2

# Number of parameter combinations per exclusion
high_depth_combinations = 16,8,4


# ------------------------------------------------------------------
# Feature-count thresholds for PARAM_GRID selection
# ------------------------------------------------------------------

# Upper bound for "small" size bucket
feature_count_small_max = 24

# Upper bound for "medium" size bucket
feature_count_medium_max = 64


# ==============================================================================
# Model training configuration
# ==============================================================================

[training]

# Root directory for TensorBoard logs and model checkpoints
logs_dir = ./logs

# File where failed model configurations are logged
failed_models_path = ./doc/failed_models.txt

# Training schedule JSON (used if mode = schedule)
schedule_path = ./schedules/schedule_final.json

# Single feature-set JSON (used if mode = config)
feature_set_path = ./sets/feature_set_all.json


# ------------------------------------------------------------------
# Dataset handling
# ------------------------------------------------------------------

time_series_length = -1
nan_fill_strategy = none
transform_targets = True


# ------------------------------------------------------------------
# Aggregate usage flags
# ------------------------------------------------------------------

use_mean = True
use_std = True
use_min = True
use_max = True
use_median = True
use_energy = True
use_slope = True
use_skewness = True
use_kurtosis = True
use_pca1 = True
use_pca2 = True
use_pca3 = True
use_pca4 = True


# ------------------------------------------------------------------
# Training mode and control
# ------------------------------------------------------------------

# Batch size for trainig
batch_size = 32

# Number of workers/threads during training (will be capped to possible maximum)
num_workers = 4

# Mode: "schedule" (iterate schedule) or "config" (single run)
mode = schedule

# If true, train on train+val and evaluate on test
final_training = False

# Store intermediate checkpoints during training
save_checkpoints = True

# Force retraining even if model(s) already exists
retrain = False


# ------------------------------------------------------------------
# LightGBM model parameters (if mode = config)
# ------------------------------------------------------------------

num_leaves = 31
max_depth = 8
n_estimators = 500
reg_lambda = 0
reg_alpha = 0
random_state = 42

learning_rate = 0.03


# ==============================================================================
# Model evaluation / testing
# ==============================================================================

[testing]

# Directory containing trained model logs
test_models_dir = ./models/FINAL_4

# Output directory for evaluation results
output_dir = ./tests/FINAL_4_ORIGINAL_TEST


# ------------------------------------------------------------------
# Evaluation behaviour
# ------------------------------------------------------------------

# If true, invert label normalization before metric computation
original_scale = True

# Maximum number of models to evaluate (-1 = no limit)
max_models = -1


# ------------------------------------------------------------------
# Optional model filters (comma-separated)
# ------------------------------------------------------------------

# Dataset splits to evaluate (e.g. test, validation)
splits = test

# Only evaluate models whose name contains one of these tokens
include =

# Skip models whose name contains one of these tokens
exclude =
